{% extends 'admin/base_admin.html' %}{% block admin_content %}<p class="eyebrow">Exploitation</p><h1>Creer un rendez-vous</h1><p class="muted">Creation manuelle depuis l'administration : telephone, accueil, demande client ou demande d'attente convertie.</p><section class="card"><form method="post" class="inline-form"><input name="customer_name" placeholder="Nom du client" required><input name="customer_email" placeholder="Email"><select name="treatment_id" required><option value="">Prestation</option>{% for t in treatments %}<option value="{{t.id}}">{{t.name}} - {{t.duration_minutes}} min</option>{% endfor %}</select><select name="user_id" required><option value="">Praticienne</option>{% for u in users %}<option value="{{u.id}}">{{u.full_name}}</option>{% endfor %}</select><select name="cabin_id" required><option value="">Cabine</option>{% for c in cabins %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select><input type="date" name="date" value="{{ today.isoformat() }}" required><input type="time" name="time" required><button>Creer le rendez-vous</button></form></section><a class="btn ghost" href="{{ url_for('appointments.index') }}">Retour aux rendez-vous</a>{% endblock %}

{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>Stocks</h1><form class="inline-form" method="post"><input name="name" placeholder="Produit"><input name="unit" value="ml"><input name="quantity" type="number" step="0.1"><input name="alert_threshold" type="number" step="0.1"><button>Ajouter</button></form><div class="grid cards">{% for p in products %}<div class="card"><h3>{{p.name}}</h3><p>{{p.quantity}} {{p.unit}}</p><small>Seuil : {{p.alert_threshold}}</small></div>{% endfor %}</div>{% endblock %}

{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>Cabines</h1><form class="inline-form" method="post"><input name="name" placeholder="Nom" required><input name="cabin_type" placeholder="Type"><select name="institute_id">{% for i in institutes %}<option value="{{i.id}}">{{i.name}}</option>{% endfor %}</select><button>Ajouter</button></form><div class="grid cards">{% for c in cabins %}<div class="card"><h3>{{c.name}}</h3><p>{{c.cabin_type}} · {{c.institute.name}}</p></div>{% endfor %}</div>{% endblock %}

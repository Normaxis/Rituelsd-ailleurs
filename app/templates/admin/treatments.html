{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>Prestations</h1><form class="inline-form" method="post"><input name="name" placeholder="Nom" required><input name="category" placeholder="Catégorie"><input name="duration" type="number" value="60"><input name="price" type="number" step="0.01" value="75"><select name="institute_id">{% for i in institutes %}<option value="{{i.id}}">{{i.name}}</option>{% endfor %}</select><button>Ajouter</button></form><table><tr><th>Nom</th><th>Durée</th><th>Prix</th><th></th></tr>{% for t in treatments %}<tr><td>{{t.name}}</td><td>{{t.duration_minutes}}</td><td>{{t.price}} €</td><td><form method="post" action="{{ url_for('admin.treatment_delete', item_id=t.id) }}"><button>Supprimer</button></form></td></tr>{% endfor %}</table>{% endblock %}

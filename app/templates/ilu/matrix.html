{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>Matrice ILU</h1><p class="legend"><b>I</b> non reservable | <b>L</b> reservable | <b>U</b> reservable expert</p><form class="inline-form" method="get"><select name="institute_id"><option value="">Tous instituts</option>{% for i in institutes %}<option value="{{i.id}}" {% if selected_institute_id==i.id %}selected{% endif %}>{{i.name}}</option>{% endfor %}</select><select name="category"><option value="">Toutes categories</option>{% for c in categories %}<option value="{{c}}" {% if selected_category==c %}selected{% endif %}>{{c}}</option>{% endfor %}</select><button>Filtrer</button></form><form method="post"><div class="table-wrap"><table><tr><th>Nom</th>{% for t in treatments %}<th>{{t.name}}</th>{% endfor %}</tr>{% for u in users %}<tr><td>{{u.full_name}}</td>{% for t in treatments %}<td><select class="ilu-select" name="level_{{u.id}}_{{t.id}}"><option value="" {% if skills.get((u.id,t.id),'')=='' %}selected{% endif %}>-</option>{% for l in ['I','L','U'] %}<option value="{{l}}" {% if skills.get((u.id,t.id),'')==l %}selected{% endif %}>{{l}}</option>{% endfor %}</select></td>{% endfor %}</tr>{% endfor %}</table></div><button class="btn">Enregistrer</button></form>{% endblock %}

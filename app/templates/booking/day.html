{% extends 'base.html' %}{% block content %}<section class="page"><h1>{{ treatment.name }} · {{ target_date.strftime('%d/%m/%Y') }}</h1><div class="slots">{% for s in slots %}<form method="post" class="slot-card"><input type="hidden" name="time" value="{{s.time}}"><strong>{{s.time}}</strong><span>{{s.user.full_name}} · {{s.cabin.name}}</span><input name="customer_name" placeholder="Votre nom" required><input name="customer_email" placeholder="Email"><button>Confirmer</button></form>{% else %}<p>Aucun créneau disponible.</p>{% endfor %}</div></section>{% endblock %}

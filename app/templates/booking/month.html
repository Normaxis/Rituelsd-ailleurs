{% extends 'base.html' %}{% block content %}<section class="page"><h1>{{ treatment.name }}</h1><p>Choisissez un jour disponible.</p><div class="month-grid">{% for d in days %}<a class="day {{ 'available' if d.available else 'disabled' }}" {% if d.available %}href="{{ url_for('booking.day_slots', treatment_id=treatment.id, day=d.date.isoformat()) }}"{% endif %}><strong>{{ d.date.strftime('%d') }}</strong><small>{{ d.date.strftime('%a') }}</small></a>{% endfor %}</div></section>{% endblock %}

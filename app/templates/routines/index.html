{% extends 'admin/base_admin.html' %}{% block admin_content %}<h1>Routines Fabriq</h1><form class="inline-form" method="post"><input name="name" placeholder="Nom"><select name="cabin_id">{% for c in cabins %}<option value="{{c.id}}">{{c.name}}</option>{% endfor %}</select><textarea name="instructions" placeholder="Une étape par ligne"></textarea><button>Créer</button></form><div class="grid cards">{% for r in routines %}<div class="card"><h3>{{r.name}}</h3><p>{{r.cabin.name if r.cabin else ''}}</p><pre>{{r.instructions}}</pre></div>{% endfor %}</div>{% endblock %}
